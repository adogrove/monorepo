name: ⚛ CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version:
          - 24.x
          - 25.x
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
      - name: ⭐ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'
      - name: 🧰 Enable Corepack
        run: corepack enable
      - name: 📦 Install dependencies
        run: yarn install --frozen-lockfile
      - name: 🧹 Lint
        run: yarn biome:strict
      - name: 🧾 Typecheck
        run: yarn typecheck
      - name: 🏗️ Build
        run: yarn build
      - name: 🧪 Test
        run: yarn test
      - name: 📝 Run automd
        run: yarn automd
      - name: 🔍 Check automd output is up to date
        run: git diff --exit-code -- '*.md' || (echo "❌ README files are out of date. Run 'yarn automd' locally and commit the changes." && exit 1)
